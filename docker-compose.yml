version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: brand_db
    environment:
      POSTGRES_USER: branduser
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: brandorder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7
    container_name: brand_cache
    volumes:
      - redis_data:/data
    expose:
      - "6379"

volumes:
  postgres_data:
  redis_data:
